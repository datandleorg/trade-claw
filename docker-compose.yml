# Share /app/data so Celery worker writes mock_engine.db + telemetry and Streamlit reads the same files.
volumes:
  trade_claw_app_data:

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run streamlit run app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - trade_claw_app_data:/app/data
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      # Same file as Celery worker — log in via Streamlit once; both containers read this path.
      KITE_SESSION_FILE: /app/data/.kite_session.json
    depends_on:
      redis:
        condition: service_healthy
    develop:
      watch:
        - path: .
          target: /app
          action: sync
          ignore:
            - "**/__pycache__"
            - "**/*.pyc"
            - ".env"
            - "data/*"
            - "node_modules"
            - "frontend/node_modules"

  # Worker code and deps come from the image (only /app/data is mounted). After changing Python or pyproject/uv.lock,
  # rebuild: `docker compose build celery-worker` (or `docker compose build`) then `docker compose up -d celery-worker`.
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run celery -A trade_claw.celery_app worker --loglevel=info
    volumes:
      - trade_claw_app_data:/app/data
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      KITE_SESSION_FILE: /app/data/.kite_session.json
    depends_on:
      redis:
        condition: service_healthy
    develop:
      watch:
        - path: .
          target: /app
          action: sync
          ignore:
            - "**/__pycache__"
            - "**/*.pyc"
            - ".env"
            - "data/*"
            - "node_modules"
            - "frontend/node_modules"

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run celery -A trade_claw.celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    develop:
      watch:
        - path: .
          target: /app
          action: sync
          ignore:
            - "**/__pycache__"
            - "**/*.pyc"
            - ".env"
            - "data/*"
            - "node_modules"
            - "frontend/node_modules"

  # Tunnel to Streamlit via host port — avoids Docker DNS "lookup streamlit ... server misbehaving"
  # when the embedded resolver flakes. Requires streamlit publishing 8501 (see streamlit.ports).
  # ngrok:
  #   image: ngrok/ngrok:latest
  #   command: http --log=stdout host.docker.internal:8501
  #   environment:
  #     NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
